apiVersion: v1
kind: Service
metadata:
  name: auth
  namespace: {{ .Values.global.environment }}
  labels:
    {{- include "ai-tutor.labels" . | nindent 4 }}
    app: auth
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.auth.port }}
      targetPort: {{ .Values.auth.port }}
      protocol: TCP
      name: http
  selector:
    app: auth
