apiVersion: apps/v1
kind: Deployment
metadata:
  name: learning
  namespace: {{ .Values.global.environment }}
  labels:
    {{- include "ai-tutor.labels" . | nindent 4 }}
    app: learning
spec:
  replicas: {{ .Values.learning.replicas }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: learning
  template:
    metadata:
      labels:
        app: learning
    spec:
      containers:
      - name: learning
        image: {{ .Values.global.imageRegistry }}/{{ .Values.learning.image }}:{{ .Values.global.imageTag }}
        ports:
        - containerPort: {{ .Values.learning.port }}
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: {{ .Values.learning.port | quote }}
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: ai-tutor-secrets
              key: MONGO_URI
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: ai-tutor-secrets
              key: JWT_SECRET
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-tutor-secrets
              key: GEMINI_API_KEY
        - name: REDIS_URL
          value: redis://redis:6379
        - name: ASSESSMENT_SERVICE_URL
          value: http://assessment:3003
        resources:
          {{- toYaml .Values.learning.resources | nindent 10 }}
        readinessProbe:
          httpGet:
            path: /health
            port: {{ .Values.learning.port }}
          initialDelaySeconds: 10
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /health
            port: {{ .Values.learning.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
          failureThreshold: 3
        volumeMounts:
        {{- if .Values.keyvault.enabled }}
        - name: secrets-store-inline
          mountPath: "/mnt/secrets-store"
          readOnly: true
        {{- end }}
      volumes:
      {{- if .Values.keyvault.enabled }}
      - name: secrets-store-inline
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "ai-tutor-secrets"
      {{- end }}
