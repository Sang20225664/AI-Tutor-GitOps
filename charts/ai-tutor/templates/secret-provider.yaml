{{- if .Values.keyvault.enabled -}}
apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: ai-tutor-secrets
  namespace: {{ .Values.global.environment }}
  labels:
    {{- include "ai-tutor.labels" . | nindent 4 }}
spec:
  provider: azure
  secretObjects:
  - secretName: ai-tutor-secrets
    type: Opaque
    data:
    - objectName: MONGO-URI
      key: MONGO_URI
    - objectName: JWT-SECRET
      key: JWT_SECRET
    - objectName: GEMINI-API-KEY
      key: GEMINI_API_KEY
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "true"
    userAssignedIdentityID: {{ .Values.keyvault.clientId | quote }}
    keyvaultName: {{ .Values.keyvault.name | quote }}
    cloudName: ""
    objects: |
      array:
        - |
          objectName: MONGO-URI
          objectType: secret
        - |
          objectName: JWT-SECRET
          objectType: secret
        - |
          objectName: GEMINI-API-KEY
          objectType: secret
    tenantId: {{ .Values.keyvault.tenantId | quote }}
{{- end }}
