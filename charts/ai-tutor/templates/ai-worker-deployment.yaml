apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-worker
  namespace: {{ .Values.global.environment }}
  labels:
    {{- include "ai-tutor.labels" . | nindent 4 }}
    app: ai-worker
spec:
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: ai-worker
  template:
    metadata:
      labels:
        app: ai-worker
    spec:
      containers:
      - name: ai-worker
        image: {{ .Values.global.imageRegistry }}/{{ index .Values "ai-worker" "image" }}:{{ .Values.global.imageTag }}
        {{- if index .Values "ai-worker" "command" }}
        command: {{ index .Values "ai-worker" "command" | toJson }}
        {{- end }}
        env:
        - name: NODE_ENV
          value: "production"
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: ai-tutor-secrets
              key: MONGO_URI
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: ai-tutor-secrets
              key: JWT_SECRET
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-tutor-secrets
              key: GEMINI_API_KEY
        - name: REDIS_URL
          value: redis://redis:6379
        - name: LEARNING_SERVICE_URL
          value: http://learning:3002
        - name: ASSESSMENT_SERVICE_URL
          value: http://assessment:3003
        - name: AI_JOB_ATTEMPTS
          value: {{ .Values.aiQueue.attempts | quote }}
        - name: AI_JOB_BACKOFF_TYPE
          value: {{ .Values.aiQueue.backoffType | quote }}
        - name: AI_JOB_BACKOFF_DELAY_MS
          value: {{ .Values.aiQueue.backoffDelayMs | quote }}
        - name: AI_JOB_REMOVE_ON_COMPLETE
          value: {{ .Values.aiQueue.removeOnComplete | quote }}
        - name: AI_JOB_REMOVE_ON_FAIL
          value: {{ .Values.aiQueue.removeOnFail | quote }}
        - name: AI_WORKER_CONCURRENCY
          value: {{ .Values.aiQueue.workerConcurrency | quote }}
        - name: AI_DLQ_NAME
          value: {{ .Values.aiQueue.dlqName | quote }}
        - name: AI_DLQ_RETENTION
          value: {{ .Values.aiQueue.dlqRetention | quote }}
        - name: AI_DLQ_REMOVE_ON_COMPLETE
          value: {{ .Values.aiQueue.dlqRemoveOnComplete | quote }}
        resources:
          {{- toYaml (index .Values "ai-worker" "resources") | nindent 10 }}
        volumeMounts:
        {{- if .Values.keyvault.enabled }}
        - name: secrets-store-inline
          mountPath: "/mnt/secrets-store"
          readOnly: true
        {{- end }}
      volumes:
      {{- if .Values.keyvault.enabled }}
      - name: secrets-store-inline
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "ai-tutor-secrets"
      {{- end }}
