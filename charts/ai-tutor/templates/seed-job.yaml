{{- if .Values.seedData.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: learning-seed-{{ .Values.global.imageTag | replace "." "-" | replace "_" "-" | trunc 40 | trimSuffix "-" }}
  namespace: {{ .Values.global.environment }}
  labels:
    {{- include "ai-tutor.labels" . | nindent 4 }}
    app: learning-seed
spec:
  backoffLimit: {{ .Values.seedData.backoffLimit }}
  ttlSecondsAfterFinished: {{ .Values.seedData.ttlSecondsAfterFinished }}
  template:
    metadata:
      labels:
        app: learning-seed
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        runAsGroup: 1001
        fsGroup: 1001
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: learning-seed
        image: {{ .Values.global.imageRegistry }}/{{ .Values.learning.image }}:{{ .Values.global.imageTag }}
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
        imagePullPolicy: {{ .Values.seedData.imagePullPolicy | quote }}
        command: ["node", "scripts/seedData.js"]
        env:
        - name: NODE_ENV
          value: "production"
        - name: FORCE_SEED
          value: {{ .Values.seedData.force | quote }}
        - name: MONGO_DB_NAME
          value: {{ .Values.seedData.dbName | quote }}
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: ai-tutor-secrets
              key: MONGO_URI
        volumeMounts:
        - name: tmp
          mountPath: /tmp
        {{- if .Values.keyvault.enabled }}
        - name: secrets-store-inline
          mountPath: "/mnt/secrets-store"
          readOnly: true
        {{- end }}
      volumes:
      - name: tmp
        emptyDir: {}
      {{- if .Values.keyvault.enabled }}
      - name: secrets-store-inline
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "ai-tutor-secrets"
      {{- end }}
{{- end }}
