apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: ai-worker-scaler
  labels:
    app: ai-worker
spec:
  scaleTargetRef:
    name: ai-worker
  pollingInterval: 15
  cooldownPeriod: 30
  minReplicaCount: 0
  maxReplicaCount: 3
  advanced:
    restoreToOriginalReplicaCount: true
  triggers:
    - type: redis
      metadata:
        address: redis.prod.svc.cluster.local:6379
        listName: bull:ai-jobs:wait
        listLength: "5"
