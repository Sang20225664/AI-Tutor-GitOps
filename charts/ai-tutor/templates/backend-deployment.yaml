apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: backend
  namespace: {{ .Values.global.environment }}
  labels:
    {{- include "ai-tutor.labels" . | nindent 4 }}
    app: backend
spec:
  replicas: {{ .Values.backend.replicas }}
  revisionHistoryLimit: 2
  strategy:
    canary:
      canaryService: backend-canary
      stableService: backend
      trafficRouting:
        nginx:
          stableIngress: ai-tutor-ingress
      steps:
      - setWeight: 20
      - pause: {}
      - setWeight: 50
      - pause: { duration: 30s }
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: {{ .Values.global.imageRegistry }}/{{ .Values.backend.image }}:{{ .Values.global.imageTag }}
        ports:
        - containerPort: {{ .Values.backend.port }}
        env:
        - name: NODE_ENV
          value: {{ .Values.backend.env.NODE_ENV }}
        {{- if .Values.backend.env.DEMO_CANARY }}
        - name: DEMO_CANARY
          value: {{ .Values.backend.env.DEMO_CANARY | quote }}
        {{- end }}
        - name: PORT
          value: {{ .Values.backend.env.PORT | quote }}
        - name: LOG_LEVEL
          value: {{ .Values.backend.env.LOG_LEVEL }}
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: ai-tutor-secrets
              key: MONGO_URI
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: ai-tutor-secrets
              key: JWT_SECRET
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: ai-tutor-secrets
              key: GEMINI_API_KEY
        - name: REDIS_URL
          value: redis://redis:6379
        - name: AICHAT_SERVICE_URL
          value: http://ai-chat:3004
        resources:
          {{- toYaml .Values.backend.resources | nindent 10 }}
        livenessProbe:
          httpGet:
            path: /api/ping
            port: {{ .Values.backend.port }}
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/ready
            port: {{ .Values.backend.port }}
          initialDelaySeconds: 10
          periodSeconds: 5
        volumeMounts:
        {{- if .Values.keyvault.enabled }}
        - name: secrets-store-inline
          mountPath: "/mnt/secrets-store"
          readOnly: true
        {{- end }}
      volumes:
      {{- if .Values.keyvault.enabled }}
      - name: secrets-store-inline
        csi:
          driver: secrets-store.csi.k8s.io
          readOnly: true
          volumeAttributes:
            secretProviderClass: "ai-tutor-secrets"
      {{- end }}
