apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: success-rate
  namespace: {{ .Values.global.environment }}
spec:
  args:
  - name: service-name
  metrics:
  - name: success-rate
    interval: 10s
    count: 6
    successCondition: result[0] >= 0.95
    failureLimit: 3
    provider:
      prometheus:
        address: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        query: |
          sum(rate(nginx_ingress_controller_requests{
            exported_namespace="{{ .Values.global.environment }}",
            exported_service="{{ "{{args.service-name}}" }}",
            canary!="",
            status!~"5.."
          }[1m]))
          /
          sum(rate(nginx_ingress_controller_requests{
            exported_namespace="{{ .Values.global.environment }}",
            exported_service="{{ "{{args.service-name}}" }}",
            canary!=""
          }[1m]))
