apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: canary-error-rate
  namespace: {{ .Values.global.environment }}
spec:
  args:
  - name: service-name
  metrics:
  - name: error-rate
    interval: 10s
    count: 12
    successCondition: result[0] <= 0.05
    failureLimit: 1
    provider:
      prometheus:
        address: http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090
        query: |
          sum(increase(nginx_ingress_controller_requests{
            exported_namespace="{{ .Values.global.environment }}",
            exported_service="{{ "{{args.service-name}}" }}",
            canary!="",
            status=~"5.."
          }[1m]))
          /
          clamp_min(
            sum(increase(nginx_ingress_controller_requests{
              exported_namespace="{{ .Values.global.environment }}",
              exported_service="{{ "{{args.service-name}}" }}",
              canary!=""
            }[1m])),
            1
          )
